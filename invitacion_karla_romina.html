<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mis XV Años - Karla Romina</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* fade-in: each section starts invisible and fades up to opacity 1 the
     moment it scrolls into view */
  .fade-section {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 1.1s ease, transform 1.1s ease;
  }
  .fade-section.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  body {
    background-color: #3a0a0d;
    background-image: url('damask_fondo.png');
    background-repeat: repeat;
    display: flex;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cinzel', serif;
    padding: 20px 0;
  }

  .card {
    position: relative;
    width: 480px;
    max-width: 94vw;
    aspect-ratio: 1023 / 1537;
    background-image: url('fondo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    color: #d9cdb8;
    box-sizing: border-box;
    overflow: hidden;
  }

  /* photo + oval frame + roses, cropped from the user's own composite image
     and placed at the same relative position it occupies in the reference */
  .photo-oval {
    position: absolute;
    top: 9.1%;
    left: 18.6%;
    width: 63%;
    z-index: 2;
  }
  .photo-oval img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* title + name + date + FALTAN bracket + labels + button, cropped straight
     from the user's reference image so the engraved metallic look matches
     exactly (this styling can't be replicated faithfully with CSS text) */
  .titulo-conteo {
    position: absolute;
    top: 52.05%;
    left: 5.87%;
    width: 88.95%;
    z-index: 2;
  }
  .titulo-conteo img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* live countdown numbers, overlaid exactly where the static digits were
     erased from the cropped image, styled to match its metallic look */
  .countdown-live {
    position: absolute;
    top: 73.1%;
    left: 22.3%;
    width: 54.6%;
    height: 5%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(2px, 0.8vw, 6px);
    z-index: 3;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(17px, 6.1vw, 32px);
    letter-spacing: 1px;
    line-height: 1;
    color: #d8cdb9;
    background: linear-gradient(180deg,#f5f0e2,#c9bd9f 45%,#a0947a 55%,#f5f0e2);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
  }
  .countdown-live .sep {
    -webkit-text-fill-color: #9a8f78;
    color: #9a8f78;
    font-weight: 400;
  }

  /* live event year, overlaid exactly where the static "2027" digits were
     erased from the cropped title image (event date corrected to 2026),
     styled to match the same engraved metallic look as the countdown */
  .date-live {
    position: absolute;
    top: 65.55%;
    left: 57.7%;
    width: 9.1%;
    height: 3%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(11px, 3.6vw, 18px);
    letter-spacing: 0.5px;
    line-height: 1;
    color: #d8cdb9;
    background: linear-gradient(180deg,#f5f0e2,#c9bd9f 45%,#a0947a 55%,#f5f0e2);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
  }
  .date-live2 {
    position: absolute;
    top: 52.45%;
    left: 57.25%;
    width: 9.3%;
    height: 2.5%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: clamp(9px, 3vw, 15px);
    letter-spacing: 0.5px;
    line-height: 1;
    color: #d8cdb9;
    background: linear-gradient(180deg,#f5f0e2,#c9bd9f 45%,#a0947a 55%,#f5f0e2);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.6));
  }

  /* invisible clickable overlay on top of the button artwork */
  .enter-btn {
    position: absolute;
    top: 82.9%;
    left: 25.4%;
    width: 48.9%;
    height: 6.6%;
    z-index: 3;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  .page {
    width: 480px;
    max-width: 94vw;
    margin: 0 auto;
  }

  .player {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    padding: 8px 14px;
    background: rgba(0,0,0,0.35);
    border-radius: 30px;
    border: 1px solid rgba(169,161,144,0.4);
  }

  .play-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: #cfc3ac;
    color: #4a0d14;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 14px;
    padding: 0;
  }

  .track-info {
    flex: 1;
    text-align: left;
    font-size: 11px;
    color: #d9cdb8;
    letter-spacing: 0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .time {
    font-size: 10px;
    color: #a9a190;
    white-space: nowrap;
  }

  .vol-btn {
    background: none;
    border: none;
    color: #cfc3ac;
    font-size: 15px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ---- second section: photo + menu grid, appended below the first card,
     none of the CSS/markup above this point was touched ---- */
  .card2 {
    position: relative;
    width: 480px;
    max-width: 94vw;
    aspect-ratio: 1023 / 1537;
    background-image: url('fondo.png');
    background-size: 100% 100%;
    background-repeat: no-repeat;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    margin-top: 24px;
    box-sizing: border-box;
    overflow: hidden;
  }

  .photo-oval2 {
    position: absolute;
    top: 9.1%;
    left: 18.6%;
    width: 63%;
    z-index: 2;
  }
  .photo-oval2 img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* title repeated here (MIS XV AÑOS / Karla Romina / date), cropped clean
     with no cut-off, sitting right under the photo's roses */
  .title2 {
    position: absolute;
    top: 37.93%;
    left: 5.86%;
    width: 88.87%;
    z-index: 2;
  }
  .title2 img {
    width: 100%;
    height: auto;
    display: block;
  }

  .menu-grid-art {
    position: absolute;
    top: 56%;
    left: 6.84%;
    width: 86.33%;
    z-index: 2;
  }
  .menu-grid-art img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* invisible clickable overlays, one per menu item, positioned over the
     artwork above */
  .menu-btn {
    position: absolute;
    z-index: 3;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  /* fixed floating control, reachable from anywhere on the page, to
     play/pause the song without scrolling back to the embed */
  .floating-audio-btn {
    position: fixed;
    bottom: 22px;
    right: 22px;
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: linear-gradient(180deg,#cfc3ac,#a0947a);
    border: 2px solid #4a0d14;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 9999;
    font-size: 20px;
    line-height: 1;
    color: #4a0d14;
    padding: 0;
  }
  .floating-audio-btn:active {
    transform: scale(0.94);
  }

  /* ---- photo gallery lightbox ---- */
  .lightbox-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,4,4,0.92);
    z-index: 10000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 70px 24px;
  }
  .lightbox-overlay.is-open {
    display: flex;
  }
  .lightbox-overlay.single-photo .lightbox-nav,
  .lightbox-overlay.single-photo .lightbox-thumbs-row {
    display: none;
  }

  .lightbox-close {
    position: absolute;
    top: 22px;
    right: 22px;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 2px solid #4a0d14;
    background: #f0e8da;
    color: #4a0d14;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.55);
    z-index: 10002;
  }
  .lightbox-close:hover {
    background: #fff;
  }

  .lightbox-main {
    position: relative;
    max-width: 900px;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .lightbox-main img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  }

  .lightbox-counter {
    position: absolute;
    left: 50%;
    bottom: 14px;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: #d9cdb8;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 20px;
  }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: 1.5px solid rgba(217,205,184,0.5);
    background: rgba(0,0,0,0.35);
    color: #d9cdb8;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
  }
  .lightbox-nav.prev { left: 18px; }
  .lightbox-nav.next { right: 18px; }

  .lightbox-thumbs-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 16px;
    width: 100%;
    max-width: 900px;
  }
  .lightbox-thumbs {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scroll-behavior: smooth;
    padding: 4px;
    flex: 1;
  }
  .lightbox-thumbs::-webkit-scrollbar { height: 6px; }
  .lightbox-thumbs::-webkit-scrollbar-thumb { background: rgba(217,205,184,0.4); border-radius: 3px; }

  .lightbox-thumbs img {
    width: 82px;
    height: 82px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.55;
    border: 2px solid transparent;
    flex-shrink: 0;
    transition: opacity 0.2s ease, border-color 0.2s ease;
  }
  .lightbox-thumbs img.active {
    opacity: 1;
    border-color: #d9cdb8;
  }

  .lightbox-thumb-nav {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1.5px solid rgba(217,205,184,0.5);
    background: rgba(0,0,0,0.35);
    color: #d9cdb8;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  @media (max-width: 640px) {
    .lightbox-overlay { padding: 60px 14px 16px; }
    .lightbox-nav { width: 38px; height: 38px; font-size: 16px; }
    .lightbox-nav.prev { left: 6px; }
    .lightbox-nav.next { right: 6px; }
    .lightbox-thumbs img { width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<div class="page">
<div class="card fade-section">
